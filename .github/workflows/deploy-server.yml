name: Deploy Multiplayer Server

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy, for example 1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: jjktbf-production-server
  cancel-in-progress: false

jobs:
  deploy-server:
    name: Build and deploy server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_HOST_KEY: ${{ secrets.SERVER_HOST_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine release version
        id: release
        shell: bash
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$MANUAL_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying JJK TBF server version $VERSION"

      - name: Check out requested tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git checkout --detach "v$VERSION"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build executable server JAR
        id: build
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          mvn -B \
            -Drevision="$VERSION" \
            -pl server \
            -am \
            clean package

          SERVER_JAR="server/target/server-$VERSION.jar"

          if [[ ! -s "$SERVER_JAR" ]]; then
            echo "Expected server JAR was not created: $SERVER_JAR" >&2
            exit 1
          fi

          if [[ "$(basename "$SERVER_JAR")" == original-* ]]; then
            echo "Refusing to deploy the unshaded original JAR." >&2
            exit 1
          fi

          jar tf "$SERVER_JAR" >/dev/null

          echo "server_jar=$SERVER_JAR" >> "$GITHUB_OUTPUT"
          echo "Built executable server JAR: $SERVER_JAR"

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail

          for SECRET_NAME in \
            SERVER_HOST \
            SERVER_USER \
            SERVER_SSH_KEY \
            SERVER_HOST_KEY
          do
            if [[ -z "${!SECRET_NAME:-}" ]]; then
              echo "Required GitHub secret is missing: $SECRET_NAME" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -d -m 700 "$HOME/.ssh"

          printf '%s\n' "$SERVER_SSH_KEY" \
            > "$HOME/.ssh/jjktbf_deploy_key"

          printf '%s\n' "$SERVER_HOST_KEY" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/jjktbf_deploy_key"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh-keygen -y \
            -f "$HOME/.ssh/jjktbf_deploy_key" \
            >/dev/null

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/jjktbf_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=10 \
            "$SERVER_USER@$SERVER_HOST" \
            "echo 'SSH deployment connection successful.'"

      - name: Upload server JAR
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SERVER_JAR: ${{ steps.build.outputs.server_jar }}
        run: |
          set -euo pipefail

          scp \
            -i "$HOME/.ssh/jjktbf_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$SERVER_JAR" \
            "$SERVER_USER@$SERVER_HOST:/tmp/jjktbf-server-$VERSION.jar"

      - name: Install and restart server
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/jjktbf_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" \
            "bash -s -- '$VERSION'" <<'REMOTE_SCRIPT'
          set -euo pipefail

          VERSION="$1"

          SERVICE_NAME="jjktbf.service"
          UPLOADED_JAR="/tmp/jjktbf-server-$VERSION.jar"
          LIVE_JAR="/opt/jjktbf/server.jar"
          BACKUP_DIRECTORY="/opt/jjktbf/backups"
          BACKUP_JAR="$BACKUP_DIRECTORY/server-$(date +%Y%m%d-%H%M%S).jar"

          rollback_server() {
              echo "Deployment failed. Restoring previous server JAR."

              systemctl stop "$SERVICE_NAME" || true

              if [[ -s "$BACKUP_JAR" ]]; then
                  install \
                    -o jjktbf \
                    -g jjktbf \
                    -m 600 \
                    "$BACKUP_JAR" \
                    "$LIVE_JAR"

                  systemctl start "$SERVICE_NAME" || true
              fi
          }

          if [[ ! -s "$UPLOADED_JAR" ]]; then
              echo "Uploaded JAR is missing or empty: $UPLOADED_JAR" >&2
              exit 1
          fi

          install \
            -d \
            -o jjktbf \
            -g jjktbf \
            -m 700 \
            "$BACKUP_DIRECTORY"

          if [[ -s "$LIVE_JAR" ]]; then
              cp "$LIVE_JAR" "$BACKUP_JAR"
              chown jjktbf:jjktbf "$BACKUP_JAR"
              chmod 600 "$BACKUP_JAR"
          fi

          systemctl stop "$SERVICE_NAME"

          if ! install \
            -o jjktbf \
            -g jjktbf \
            -m 600 \
            "$UPLOADED_JAR" \
            "$LIVE_JAR"
          then
              systemctl start "$SERVICE_NAME" || true
              exit 1
          fi

          if ! systemctl start "$SERVICE_NAME"; then
              rollback_server
              exit 1
          fi

          SERVER_READY=false

          for ATTEMPT in $(seq 1 30); do
              if systemctl is-active --quiet "$SERVICE_NAME" \
                  && curl \
                    --silent \
                    --show-error \
                    --connect-timeout 2 \
                    --output /dev/null \
                    "http://127.0.0.1:7070/"
              then
                  SERVER_READY=true
                  break
              fi

              sleep 1
          done

          if [[ "$SERVER_READY" != true ]]; then
              echo "The new server did not become ready." >&2
              journalctl \
                -u "$SERVICE_NAME" \
                -n 100 \
                --no-pager \
                || true

              rollback_server
              exit 1
          fi

          rm -f "$UPLOADED_JAR"

          echo "Server $VERSION deployed successfully."

          systemctl status \
            "$SERVICE_NAME" \
            --no-pager \
            -l

          journalctl \
            -u "$SERVICE_NAME" \
            -n 30 \
            --no-pager
          REMOTE_SCRIPT

      - name: Verify public server
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --silent \
            --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --output /dev/null \
            "https://play.jjktbf.com/"

          echo "Public HTTPS connection succeeded."
