name: jjktbf

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jjktbf}
      POSTGRES_USER: ${DATABASE_USERNAME:-jjktbf}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-jjktbf-local-development}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - jjktbf-postgres:/var/lib/postgresql/data

volumes:
  jjktbf-postgres:
