# Release pipeline — builds native macOS + Windows installers on their own
# runners and attaches them (plus SHA-256 checksums) to a GitHub Release.
#
# Trigger: push an annotated tag matching v* (e.g. v1.2.0). The version is
# taken from the tag (the leading 'v' is stripped); you do not need to edit
# any build file. See RELEASE.md for the full process.
#
# Each platform job:
#   1. sets up JDK 17 (Temurin),
#   2. runs packaging/package.sh with the tag version, producing one stamped
#      artifact in dist/,
#   3. uploads that artifact.
#
# The release job (tag pushes only) downloads all artifacts, generates a
# SHA256SUMS file, and publishes them to a GitHub Release via
# softprops/action-gh-release.
#
# Manual runs (workflow_dispatch) are BUILD-ONLY: they build and upload
# artifacts to the Actions run for testing, but the release job is skipped
# (it is gated on github.event_name == 'push'). Only a real tag publishes.
#
# Code signing / notarization is OPTIONAL and secret-gated: the build runs
# unsigned unless the corresponding secrets are present. See RELEASE.md for
# how to add them later without changing this file.

name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow manual runs from the Actions tab. These are BUILD-ONLY: the release
  # job is skipped, so no release is published. The version must be strict
  # SemVer (MAJOR.MINOR.PATCH) or the run fails — see the context job below.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.2.0), without leading v'
        required: true
        default: '0.0.0'

# Least privilege by default. The release job below escalates to
# contents: write, which is the only thing that needs it.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Determine the version once and share it.
  # ---------------------------------------------------------------------------
  context:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        shell: bash
        # NEVER interpolate github.event.inputs.* directly into a shell command:
        # that is shell injection. Pass it through the environment, then
        # validate it against strict SemVer before it reaches anything.
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            V="$INPUT_VERSION"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          if ! printf '%s' "$V" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "ERROR: version '$V' is not strict SemVer (MAJOR.MINOR.PATCH)." >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: $V"

  # ---------------------------------------------------------------------------
  # Platform-independent multiplayer server fat JAR.
  # ---------------------------------------------------------------------------
  build-server:
    needs: context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.m2/repository
          key: server-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: server-m2-

      - name: Build and test server
        shell: bash
        run: mvn -Drevision="${{ needs.context.outputs.version }}" -pl server -am clean verify

      - name: Stage server artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "server/target/server-${{ needs.context.outputs.version }}.jar" \
            "dist/jjktbf-server-${{ needs.context.outputs.version }}.jar"

      - name: Upload server artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jjktbf-server-${{ needs.context.outputs.version }}.jar
          path: dist/jjktbf-server-${{ needs.context.outputs.version }}.jar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS (arm64 — Apple Silicon) and macOS (x64 — Intel).
  # ---------------------------------------------------------------------------
  build-macos:
    needs: context
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest      # Apple Silicon (M1) -> arm64 .dmg
            arch: arm64
          - runner: macos-15-intel   # Intel -> x64 .dmg
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ matrix.arch }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-${{ matrix.arch }}-

      - name: Build macOS package
        shell: bash
        env:
          # Signing is only active when ALL of these secrets exist.
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_DEV_ID:       ${{ secrets.APPLE_APPLE_ID }}
          APPLE_DEV_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_KEYCHAIN:     ${{ secrets.APPLE_KEYCHAIN }}
        # needs.context.outputs.version is the validated SemVer from above.
        run: |
          ./packaging/package.sh "${{ needs.context.outputs.version }}"

      - name: Locate artifact
        id: art
        shell: bash
        run: |
          f="$(find dist -name 'JujutsuKaisenFighter-*.dmg' | head -1)"
          echo "path=$f" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$f")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # actions/upload-artifact@v4
        with:
          name: ${{ steps.art.outputs.name }}
          path: ${{ steps.art.outputs.path }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows (x64).
  # ---------------------------------------------------------------------------
  build-windows:
    needs: context
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # WiX (required by jpackage for MSI) is preinstalled on windows-latest.
      - name: Cache Maven dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build Windows package
        shell: bash
        env:
          WIN_CERT_P12:     ${{ secrets.WIN_CERT_P12 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        # needs.context.outputs.version is the validated SemVer from above.
        run: |
          ./packaging/package.sh "${{ needs.context.outputs.version }}"

      - name: Locate artifact
        id: art
        shell: bash
        run: |
          f="$(find dist -name 'JujutsuKaisenFighter-*.msi' | head -1)"
          echo "path=$f" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$f")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # actions/upload-artifact@v4
        with:
          name: ${{ steps.art.outputs.name }}
          path: ${{ steps.art.outputs.path }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish: gather all artifacts and attach them to a GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    # Manual workflow_dispatch runs are BUILD-ONLY: they produce artifacts
    # (downloadable from the Actions run) but never publish a release.
    # Only a real tag push (v*) reaches this job. This prevents an unreviewed
    # manual run from creating a public release.
    if: ${{ github.event_name == 'push' }}
    needs: [context, build-server, build-macos, build-windows]
    runs-on: ubuntu-latest
    # This is the ONLY job that needs to create a release.
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      # Publish SHA-256 checksums alongside the installers so users can verify
      # download integrity. Especially important while installers are unsigned.
      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd artifacts
          # Hash every installer file. Write to a temp first, then move into
          # place, so SHA256SUMS is never an input to its own generation.
          find . -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.tmp
          mv SHA256SUMS.tmp SHA256SUMS
          echo "::group::SHA-256 checksums"
          cat SHA256SUMS
          echo "::endgroup::"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d  # softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.context.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*
